<div class="layout">
  <header class="header">
    <button class="hamburger" (click)="toggleMenu()" type="button" aria-label="Toggle menu">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>
    <h1 class="app-title">Contour</h1>
  </header>

  @if (menuOpen) {
    <div class="menu-backdrop" (click)="closeMenu()" aria-hidden="true"></div>
    <nav class="menu-drawer" [attr.aria-hidden]="!menuOpen">
      <a routerLink="/professional" (click)="closeMenu()" routerLinkActive="active">Professional</a>
      <a routerLink="/games" (click)="closeMenu()" routerLinkActive="active">Games</a>
    </nav>
  }

  <main class="main">
    <router-outlet />
  </main>
</div>
